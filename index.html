<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi Presesi: Kenapa Zodiak Gak Cocok Sama Langit?</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050512;--panel:#0b0b24;--border:#1a1a40;
  --tropic:#ff8c69;--sid:#54a0ff;--gold:#ffd32a;
  --earth:#2ed573;--text:#f1f2f6;--muted:#747d8c;
  --purple:#a55eea;--cyan:#00d2d3;
  --fh:'Space Grotesk',sans-serif;--fm:'Space Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--fh);min-height:100vh;padding:1.5rem;padding-bottom:5rem}
.page{max-width:980px;margin:0 auto}

.eyebrow{font-family:var(--fm);font-size:.7rem;letter-spacing:.2em;color:var(--cyan);text-transform:uppercase;margin-bottom:.3rem;font-weight:700}
h1{font-size:clamp(1.5rem,3vw,2.3rem);font-weight:700;line-height:1.2;margin-bottom:.5rem}
h1 em{font-style:normal;color:var(--gold)}
.sub{color:var(--muted);font-size:.92rem;margin-bottom:1.5rem;line-height:1.5}

/* Tabs Navigation */
.tabs{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:.6rem 1.1rem;border-radius:.6rem;border:1px solid var(--border);background:var(--panel);
     color:var(--muted);font-family:var(--fh);font-size:.82rem;font-weight:600;cursor:pointer;transition:.2s}
.tab:hover{color:var(--text);border-color:var(--muted)}
.tab.active{background:var(--gold);color:#000;border-color:var(--gold);box-shadow:0 0 15px rgba(255,211,42,.25)}
.tab.tab-precession{border-color:var(--purple);color:#d1ccc0}
.tab.tab-precession.active{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 0 15px rgba(165,94,234,.4)}

/* Canvas Area */
.canvas-card{background:var(--panel);border:1px solid var(--border);border-radius:1.2rem;padding:1.25rem;margin-bottom:1.5rem}
canvas#anim{display:block;width:100%;border-radius:.8rem;background:#03030a;border:1px solid rgba(255,255,255,.05)}

/* Controls Bar */
.controls{display:flex;align-items:center;gap:.8rem;margin-top:1.2rem;flex-wrap:wrap}
.btn{padding:.6rem 1.2rem;border-radius:.6rem;border:none;cursor:pointer;font-family:var(--fh);font-size:.85rem;font-weight:700;transition:.15s}
.btn-play{background:var(--gold);color:#000}
.btn-play:hover{background:#ffc000;transform:translateY(-1px)}
.btn-reset{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-reset:hover{border-color:var(--text);background:rgba(255,255,255,.05)}

/* Era Switcher */
.era-wrap{display:none;align-items:center;gap:.5rem;background:#03030a;border:1px solid var(--purple);padding:.25rem;border-radius:.6rem;margin-left:auto}
@media(max-width:650px){.era-wrap{margin-left:0;width:100%;justify-content:center}}
.era-btn{padding:.4rem .8rem;border-radius:.4rem;border:none;background:transparent;color:var(--muted);font-family:var(--fm);font-size:.75rem;font-weight:700;cursor:pointer;transition:.2s}
.era-btn.active{background:var(--purple);color:#fff}

.mode-toggle{display:flex;background:#03030a;border:1px solid var(--border);border-radius:.6rem;padding:.2rem;margin-left:auto}
.mode-btn{padding:.4rem .8rem;border-radius:.4rem;border:none;background:transparent;color:var(--muted);font-family:var(--fm);font-size:.72rem;cursor:pointer;font-weight:700}
.mode-btn.active{background:var(--border);color:var(--gold)}

/* Structured Cards Box */
.grid-cards{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
@media(max-width:700px){.grid-cards{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--border);border-radius:1rem;padding:1.4rem;line-height:1.6}
.card.full{grid-column:1/-1;border-left:4px solid var(--cyan);background:linear-gradient(90deg, rgba(0,210,211,.05), transparent)}
.card h3{font-size:1.05rem;font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem}
.card p{font-size:.88rem;color:var(--muted);margin-bottom:.8rem}
.card p strong{color:var(--text)}
.card p:last-child{margin-bottom:0}
.badge{font-family:var(--fm);font-size:.72rem;padding:.15rem .5rem;border-radius:.3rem;background:rgba(255,255,255,.1);color:#fff;font-weight:700}
</style>
</head>
<body>
<div class="page">

<div class="eyebrow">Astronomi & Astrologi</div>
<h1>Misteri <em>"Titik Aries"</em> yang Kini Ada di Pisces</h1>
<p class="sub">Mengapa ramalan zodiak Barat tidak lagi presisi dengan posisi rasi bintang asli di langit malam?</p>

<div class="tabs">
  <button class="tab" data-step="1">① Pembuktian Selisih Per Harinya</button>
  <button class="tab" data-step="0">② Rotasi Murni 360°</button>
  <button class="tab" data-step="2">③ Jam Real-Time</button>
  <button class="tab" data-step="3">④ Akumulasi 1 Tahun (365 vs 366)</button>
  <button class="tab tab-precession active" data-step="4">⑤ Kenapa Zodiak Geser? 🌌</button>
</div>

<div class="canvas-card">
  <canvas id="anim" height="440"></canvas>
  <div class="controls">
    <button class="btn btn-play" id="btnPlay">▶ Play Animasi</button>
    <button class="btn btn-reset" id="btnReset">↺ Ulang dari Awal</button>
    
    <div class="era-wrap" id="eraWrap" style="display:flex">
      <span style="font-size:.75rem;color:var(--muted);font-weight:700;padding-left:.5rem">WAKTU:</span>
      <button class="era-btn" data-era="now">Sekarang (2026 M)</button>
      <button class="era-btn active" data-era="ancient">Zaman Kuno (0 M)</button>
    </div>

    <div class="mode-toggle" id="modeWrap" style="display:none">
      <button class="mode-btn active" data-deg="45">Mode 45° (Eksagerasi Jelas)</button>
      <button class="mode-btn" data-deg="1">Mode 0,9856° (Skala Nyata)</button>
    </div>
  </div>
</div>

<div id="infoGrid" class="grid-cards"></div>

</div>

<script>
const canvas = document.getElementById('anim');
const ctx = canvas.getContext('2d');

let step = 4; // Default ke Tab 5
let playing = false;
let progress = 0; 
let raf;
let lastTs = null;
let EXTRA_DEG = 45;
let currentEra = "ancient"; // Mulai dari zaman kuno agar sesuai dengan klik Play pertama kali

const SID_DAY_SEC = 86164.1;
const SOL_DAY_SEC = 86400;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth - 40;
  const h = Math.min(w * 0.6, 440);
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', () => { resize(); draw(); });

function W(){ return canvas.width / (window.devicePixelRatio||1); }
function H(){ return canvas.height / (window.devicePixelRatio||1); }

function drawStarBg() {
  const w = W(), h = H();
  const seed = [[0.05,0.1],[0.15,0.07],[0.28,0.18],[0.72,0.05],[0.85,0.12],[0.92,0.25],[0.08,0.75],[0.18,0.88],[0.88,0.72],[0.95,0.85],[0.42,0.08],[0.60,0.12],[0.78,0.92],[0.30,0.90],[0.55,0.95],[0.12,0.50],[0.90,0.50],[0.50,0.04],[0.65,0.80],[0.35,0.60]];
  for(const [fx,fy] of seed){
    ctx.beginPath();
    ctx.arc(fx*w, fy*h, 1.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();
  }
}

function drawSun(x, y, r){
  const g = ctx.createRadialGradient(x,y,0,x,y,r*2.5);
  g.addColorStop(0,'rgba(255,160,0,.35)');
  g.addColorStop(1,'rgba(255,160,0,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r*2.5,0,Math.PI*2); ctx.fill();
  
  const g2 = ctx.createRadialGradient(x-r*.2,y-r*.2,r*.05,x,y,r);
  g2.addColorStop(0,'#fff8c0'); g2.addColorStop(.6,'#ffae00'); g2.addColorStop(1,'#d45b00');
  ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  
  ctx.font='700 11px Space Grotesk'; ctx.fillStyle='#ffae00'; ctx.textAlign='center';
  ctx.fillText('MATAHARI', x, y + r + 15);
}

function drawEarth(x, y, r, pointerAngle, style="solid", label=""){
  ctx.save();
  ctx.translate(x, y);
  if(style === "ghost") ctx.globalAlpha = 0.25;
  else if(style === "sidereal") ctx.globalAlpha = 0.75;

  const g = ctx.createRadialGradient(0,0,0,0,0,r*1.6);
  g.addColorStop(0, style === "sidereal" ? 'rgba(84,160,255,.4)' : 'rgba(46,213,115,.3)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,r*1.6,0,Math.PI*2); ctx.fill();
  
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  if(style === "sidereal") ctx.fillStyle = "#2e86de";
  else if(style === "ghost") ctx.fillStyle = "#57606f";
  else {
    const g2=ctx.createRadialGradient(-r*.2,-r*.2,r*.1,0,0,r);
    g2.addColorStop(0,'#7bed9f'); g2.addColorStop(.6,'#2ed573'); g2.addColorStop(1,'#1b9cfc');
    ctx.fillStyle=g2;
  }
  ctx.fill();
  
  ctx.rotate(pointerAngle);
  ctx.strokeStyle = style === "sidereal" ? "#54a0ff" : "#ffffff";
  ctx.lineWidth = style === "ghost" ? 1.5 : 2.5;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(r*1.5, 0); ctx.stroke();
  
  ctx.beginPath(); ctx.arc(r*1.5, 0, 3.5, 0, Math.PI*2);
  ctx.fillStyle = style === "sidereal" ? "#54a0ff" : "#ffd32a";
  ctx.fill();
  
  ctx.restore();

  if(label){
    ctx.save();
    ctx.font = '700 11px Space Grotesk';
    ctx.fillStyle = style === "sidereal" ? '#54a0ff' : '#2ed573';
    ctx.textAlign = 'center';
    ctx.fillText(label, x, y - r*1.8);
    ctx.restore();
  }
}

// ────────────────────────────────────────────
// STEP 4: KOREKSI VISUAL PRESESI & ZODIAK (TAB 5)
// ────────────────────────────────────────────
function drawStep4(p){
  const w = W(), h = H();
  const sunX = w * 0.45, sunY = h * 0.52;
  const earthR = Math.min(w, h) * 0.075;
  const earthX = w * 0.16, earthY = sunY;

  ctx.clearRect(0, 0, w, h);
  drawStarBg();

  const zodiacX = w * 0.82;
  const ariesY = h * 0.25;
  const piscesY = h * 0.52;
  const aquaY = h * 0.79;

  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.lineWidth = 40; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(zodiacX, ariesY - 20); ctx.lineTo(zodiacX, aquaY + 20); ctx.stroke();
  ctx.restore();

  // Animasi progress p (0 sampai 1) bergerak dari Aries (Kuno) ke Pisces (Sekarang) dan terus ke Aquarius (Masa Depan)
  // Jika tidak sedang dimainkan (playing=false), ikuti posisi dari tombol yang diklik
  let currentTargetY = ariesY;
  let targetColor = "#a55eea";
  let labelText = "Garis Pandang 0 Masehi: 21 Maret Tepat Menunjuk Aries!";

  if(playing || p > 0){
    // Animasi bergerak mulus turun melewati rasi-rasi
    currentTargetY = ariesY + (p * (aquaY - ariesY));
    if(currentTargetY < piscesY - 30){
      targetColor = "#a55eea";
      labelText = "Zaman Kuno (~0 M): 21 Maret Menunjuk ARIES";
      updateEraButtons("ancient");
    } else if(currentTargetY < aquaY - 30){
      targetColor = "#00d2d3";
      labelText = "Zaman Sekarang (~2026 M): 21 Maret Menunjuk PISCES (Geser 1 Bulan!)";
      updateEraButtons("now");
    } else {
      targetColor = "#ffd32a";
      labelText = "Masa Depan (~2600 M): 21 Maret Akan Menunjuk AQUARIUS";
      updateEraButtons("none");
    }
  } else {
    // Mode statis mengikuti tombol era
    if(currentEra === "now"){
      currentTargetY = piscesY;
      targetColor = "#00d2d3";
      labelText = "Zaman Sekarang (2026 M): 21 Maret Menunjuk PISCES (Geser 1 Bulan!)";
    } else {
      currentTargetY = ariesY;
      targetColor = "#a55eea";
      labelText = "Zaman Kuno (0 Masehi): 21 Maret Tepat Menunjuk Aries!";
    }
  }

  drawZodiacBox(zodiacX, ariesY, "♈ RASI ARIES", "Awal Musim Semi Kuno (~0 M)", Math.abs(currentTargetY - ariesY) < 40 ? "#a55eea" : "rgba(255,255,255,.3)");
  drawZodiacBox(zodiacX, piscesY, "♓ RASI PISCES", "Posisi Nyata Sekarang (2026 M)", Math.abs(currentTargetY - piscesY) < 40 ? "#00d2d3" : "rgba(255,255,255,.3)");
  drawZodiacBox(zodiacX, aquaY, "♒ RASI AQUARIUS", "Masa Depan (~2600 M)", Math.abs(currentTargetY - aquaY) < 40 ? "#ffd32a" : "rgba(255,255,255,.2)");

  ctx.save();
  ctx.strokeStyle = targetColor; ctx.lineWidth = 3; ctx.setLineDash([8,6]);
  ctx.beginPath(); ctx.moveTo(earthX, earthY); ctx.lineTo(zodiacX - 70, currentTargetY); ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.fillStyle = targetColor;
  ctx.beginPath(); ctx.arc(zodiacX - 70, currentTargetY, 6, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  drawSun(sunX, sunY, Math.min(w, h) * 0.08);
  
  const tilt = -(p * 0.8) + 0.3; // Kemiringan berubah saat sumbu bergoyang
  drawEarth(earthX, earthY, earthR, playing ? tilt : (currentEra === "ancient" ? -0.3 : 0.3), "solid");
  
  ctx.save();
  ctx.font = '700 11px Space Grotesk'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText('BUMI (21 Maret / Ekuinoks)', earthX, earthY + earthR + 20);
  ctx.restore();

  ctx.save();
  ctx.font = '700 12px Space Grotesk'; ctx.fillStyle = targetColor; ctx.textAlign = 'center';
  ctx.fillText(labelText, (earthX + zodiacX)/2 - 30, Math.min(earthY, currentTargetY) - 15);
  ctx.restore();
}

function updateEraButtons(activeEra){
  document.querySelectorAll('.era-btn').forEach(b => {
    b.classList.remove('active');
    if(b.dataset.era === activeEra) b.classList.add('active');
  });
}

function drawZodiacBox(x, y, title, sub, color){
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 2;
  ctx.fillStyle = 'rgba(11,11,36,.8)';
  ctx.fillRect(x - 90, y - 28, 180, 56);
  ctx.strokeRect(x - 90, y - 28, 180, 56);
  
  ctx.font = '700 13px Space Grotesk'; ctx.fillStyle = color; ctx.textAlign = 'center';
  ctx.fillText(title, x, y - 5);
  ctx.font = '400 10px Space Grotesk'; ctx.fillStyle = '#aaa';
  ctx.fillText(sub, x, y + 14);
  ctx.restore();
}

// ────────────────────────────────────────────
// STEPS LAINNYA (1, 0, 2, 3)
// ────────────────────────────────────────────
function drawStep1(p){
  const w = W(), h = H(), sunX = w * 0.38, sunY = h * 0.48;
  const orbitR = Math.min(w, h) * 0.35, earthR = Math.min(w, h) * 0.055;
  ctx.clearRect(0, 0, w, h); drawStarBg();
  ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,.12)'; ctx.lineWidth = 1.5; ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.arc(sunX, sunY, orbitR, 0, Math.PI*2); ctx.stroke(); ctx.restore();
  drawSun(sunX, sunY, Math.min(w, h) * 0.07);

  const startOrbitAngle = Math.PI, extraRad = EXTRA_DEG * Math.PI / 180, totalSpinRad = (Math.PI * 2) + extraRad;
  const curOrbitAngle = startOrbitAngle - (p * extraRad), curSpinAngle = -(p * totalSpinRad); 
  const ex0 = sunX - orbitR, ey0 = sunY, pSidereal = (Math.PI * 2) / totalSpinRad; 
  const sidOrbitAngle = startOrbitAngle - (pSidereal * extraRad);
  const exSid = sunX + Math.cos(sidOrbitAngle) * orbitR, eySid = sunY + Math.sin(sidOrbitAngle) * orbitR;
  const ex = sunX + Math.cos(curOrbitAngle) * orbitR, ey = sunY + Math.sin(curOrbitAngle) * orbitR, starX = w * 0.94;

  ctx.fillStyle = '#fff'; ctx.font = '700 11px Space Grotesk'; ctx.textAlign = 'right';
  ctx.fillText('★ Bintang Acuan Jauh (Sejajar)', starX, sunY - 15);
  drawEarth(ex0, ey0, earthR, 0, "ghost", "00:00");
  ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(ex0, ey0); ctx.lineTo(starX, ey0); ctx.stroke(); ctx.restore();

  if(p >= pSidereal){
    ctx.save(); ctx.strokeStyle = '#54a0ff'; ctx.lineWidth = 1.8; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(exSid, eySid); ctx.lineTo(starX, eySid); ctx.stroke(); ctx.restore();
    drawEarth(exSid, eySid, earthR, 0, "sidereal", "23j 56m (Sideris)");
    ctx.save(); ctx.strokeStyle = 'rgba(255,140,0,.4)'; ctx.setLineDash([2,4]);
    ctx.beginPath(); ctx.moveTo(exSid, eySid); ctx.lineTo(sunX, sunY); ctx.stroke(); ctx.restore();
  }
  ctx.save(); ctx.strokeStyle = '#ff8c69'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(sunX, sunY); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.strokeStyle = 'rgba(84,160,255,.5)'; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(starX, ey); ctx.stroke(); ctx.restore();
  drawEarth(ex, ey, earthR, curSpinAngle, "solid", p >= 0.99 ? "24j 00m (Surya)" : "");

  if(p > pSidereal){
    ctx.save(); ctx.strokeStyle = '#ffd32a'; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.arc(ex, ey, earthR * 1.8, Math.atan2(sunY - ey, sunX - ex), 0); ctx.stroke();
    ctx.font = '700 12px Space Mono'; ctx.fillStyle = '#ffd32a'; ctx.textAlign = 'left';
    ctx.fillText(`Δ ${EXTRA_DEG === 45 ? "45°" : "~1°"} (~3m 56s)`, ex + earthR * 2, ey + 5); ctx.restore();
  }
}

function drawStep0(p){
  const w = W(), h = H(), cx = w/2, cy = h/2, earthR = Math.min(w, h) * 0.12;
  ctx.clearRect(0, 0, w, h); drawStarBg();
  const starX = w * 0.85;
  ctx.save(); ctx.strokeStyle = '#54a0ff'; ctx.lineWidth = 2; ctx.setLineDash([6,6]);
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(starX, cy); ctx.stroke(); ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = '700 13px Space Grotesk'; ctx.textAlign = 'center';
  ctx.fillText('★ Bintang Acuan Jauh', starX, cy - 15);
  drawEarth(cx, cy, earthR, -(p * Math.PI * 2), "solid", "Rotasi Murni 360°");
}

function drawStep2(p){
  const w = W(), h = H(), cx = w * 0.35, cy = h * 0.5, orbitR = Math.min(w, h) * 0.32, earthR = Math.min(w, h) * 0.065;
  ctx.clearRect(0, 0, w, h); drawStarBg();
  drawSun(cx, cy, Math.min(w, h) * 0.07);
  const curOrb = Math.PI - (p * (EXTRA_DEG * Math.PI / 180)), ex = cx + Math.cos(curOrb) * orbitR, ey = cy + Math.sin(curOrb) * orbitR;
  ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.arc(cx, cy, orbitR, 0, Math.PI*2); ctx.stroke(); ctx.restore();
  drawEarth(ex, ey, earthR, -(p * ((Math.PI * 2) + (EXTRA_DEG * Math.PI / 180))), "solid");

  const sidSec = Math.min(SID_DAY_SEC, p * SID_DAY_SEC * (1 + EXTRA_DEG/360)), solSec = p * SOL_DAY_SEC, pad = n => String(Math.floor(n)).padStart(2, '0');
  const tx = w * 0.68, ty = h * 0.4;
  ctx.save(); ctx.fillStyle = '#111130'; ctx.strokeStyle = '#54a0ff'; ctx.lineWidth = 2;
  ctx.fillRect(tx - 15, ty - 30, 220, 70); ctx.strokeRect(tx - 15, ty - 30, 220, 70);
  ctx.font = '700 11px Space Grotesk'; ctx.fillStyle = '#54a0ff'; ctx.fillText('JAM SIDERIS (BINTANG)', tx, ty - 10);
  ctx.font = '700 24px Space Mono'; ctx.fillStyle = '#fff'; ctx.fillText(`${pad(sidSec/3600)}:${pad((sidSec%3600)/60)}:${pad(sidSec%60)}`, tx, ty + 20);
  const ty2 = ty + 90;
  ctx.fillStyle = '#111130'; ctx.strokeStyle = '#ff8c69';
  ctx.fillRect(tx - 15, ty2 - 30, 220, 70); ctx.strokeRect(tx - 15, ty2 - 30, 220, 70);
  ctx.font = '700 11px Space Grotesk'; ctx.fillStyle = '#ff8c69'; ctx.fillText('JAM SURYA (MATAHARI)', tx, ty2 - 10);
  ctx.font = '700 24px Space Mono'; ctx.fillStyle = '#fff'; ctx.fillText(`${pad(solSec/3600)}:${pad((solSec%3600)/60)}:${pad(solSec%60)}`, tx, ty2 + 20);
  ctx.restore();
}

function drawStep3(p){
  const w = W(), h = H(), cx = w * 0.45, cy = h * 0.53, orbitR = Math.min(w, h) * 0.36, earthR = Math.min(w, h) * 0.05;
  ctx.clearRect(0, 0, w, h); drawStarBg();
  drawSun(cx, cy, Math.min(w, h) * 0.07);
  ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.lineWidth = 1.5; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.arc(cx, cy, orbitR, 0, Math.PI*2); ctx.stroke(); ctx.restore();
  const orbAngle = Math.PI - (p * Math.PI * 2), ex = cx + Math.cos(orbAngle) * orbitR, ey = cy + Math.sin(orbAngle) * orbitR;
  const solarDays = p * 365.24, siderealDays = p * 366.24;
  drawEarth(ex, ey, earthR, -(p * Math.PI * 12), "solid");
  ctx.save(); ctx.strokeStyle = '#ff8c69'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(cx, cy); ctx.stroke(); ctx.restore();
  
  const tx = w * 0.72, ty = h * 0.25;
  ctx.save(); ctx.fillStyle = '#111130'; ctx.strokeStyle = '#ff8c69'; ctx.lineWidth = 2;
  ctx.fillRect(tx - 20, ty, 230, 80); ctx.strokeRect(tx - 20, ty, 230, 80);
  ctx.font = '700 11px Space Grotesk'; ctx.fillStyle = '#ff8c69'; ctx.fillText('HARI SURYA (KALENDER KITA)', tx, ty + 20);
  ctx.font = '700 28px Space Mono'; ctx.fillStyle = '#fff'; ctx.fillText(`${solarDays.toFixed(1)} hari`, tx, ty + 55);
  const ty2 = ty + 95;
  ctx.fillStyle = '#111130'; ctx.strokeStyle = '#54a0ff';
  ctx.fillRect(tx - 20, ty2, 230, 80); ctx.strokeRect(tx - 20, ty2, 230, 80);
  ctx.font = '700 11px Space Grotesk'; ctx.fillStyle = '#54a0ff'; ctx.fillText('ROTASI SIDERIS (THD BINTANG)', tx, ty2 + 20);
  ctx.font = '700 28px Space Mono'; ctx.fillStyle = '#fff'; ctx.fillText(`${siderealDays.toFixed(1)} rotasi`, tx, ty2 + 55); ctx.restore();
}

function draw(){
  if(step === 4) drawStep4(progress);
  else if(step === 1) drawStep1(progress);
  else if(step === 0) drawStep0(progress);
  else if(step === 2) drawStep2(progress);
  else if(step === 3) drawStep3(progress);
}

      <div class="card">
        <h3 style="color:var(--sid)"> Hari Sideris <span class="badge" style="background:var(--sid)">23j 56m 04s</span></h3>
        <p>Bumi selesai berputar tepat <strong>360° pada sumbunya</strong>. Jarum pengamat sudah sejajar dengan bintang acuan semula, namun belum menghadap Matahari karena Bumi sudah bergerak maju di jalurnya!</p>
      </div>

  }
}

const ANIM_DUR = [3.5, 5.5, 6, 10, 8];
function loop(ts){
  if(!playing) return;
  if(!lastTs) lastTs = ts;
  const dt = (ts - lastTs) / 1000;
  lastTs = ts;
  progress = Math.min(1, progress + (dt / ANIM_DUR[step]));
  draw();
  if(progress >= 1){ 
    playing = false; 
    document.getElementById('btnPlay').innerHTML = '▶ Play Animasi'; 
    return; 
  }
  raf = requestAnimationFrame(loop);
}

document.getElementById('btnPlay').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('btnPlay').innerHTML = playing ? '⏸ Pause' : '▶ Play Animasi';
  if(playing){ lastTs = null; raf = requestAnimationFrame(loop); }
});

document.getElementById('btnReset').addEventListener('click', () => {
  playing = false; progress = 0;
  document.getElementById('btnPlay').innerHTML = '▶ Play Animasi';
  cancelAnimationFrame(raf); draw();
});

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    step = +t.dataset.step;
    playing = false; progress = 0;
    document.getElementById('btnPlay').innerHTML = '▶ Play Animasi';
    updateUI(); draw();
  });
});

document.querySelectorAll('.mode-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    EXTRA_DEG = +b.dataset.deg;
    progress = 0; playing = false;
    document.getElementById('btnPlay').innerHTML = '▶ Play Animasi';
    draw();
  });
});

document.querySelectorAll('.era-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.era-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentEra = b.dataset.era;
    // Hentikan play otomatis jika pengguna mengklik manual tombol era agar tidak bertabrakan
    playing = false;
    progress = 0;
    document.getElementById('btnPlay').innerHTML = '▶ Play Animasi';
    draw();
  });
});

updateUI();
draw();
</script>
