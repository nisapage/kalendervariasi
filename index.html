<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi Master: Hari & Kalender (Sideris vs Surya/Tropis)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050512;--panel:#0b0b24;--border:#1a1a40;
  --tropic:#ff8c69;--sid:#54a0ff;--gold:#ffd32a;
  --earth:#2ed573;--text:#f1f2f6;--muted:#747d8c;
  --purple:#a55eea;
  --fh:'Space Grotesk',sans-serif;--fm:'Space Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--fh);min-height:100vh;padding:1.5rem;padding-bottom:4rem}
.page{max-width:960px;margin:0 auto}

.eyebrow{font-family:var(--fm);font-size:.7rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:.3rem;font-weight:700}
h1{font-size:clamp(1.5rem,3vw,2.3rem);font-weight:700;line-height:1.2;margin-bottom:.5rem}
h1 em{font-style:normal;color:var(--gold)}
.sub{color:var(--muted);font-size:.92rem;margin-bottom:1.5rem;line-height:1.5}

/* Tabs */
.tabs{display:flex;gap:.5rem;margin-bottom:1.25rem;flex-wrap:wrap}
.tab{padding:.6rem 1.1rem;border-radius:.6rem;border:1px solid var(--border);background:var(--panel);
     color:var(--muted);font-family:var(--fh);font-size:.82rem;font-weight:600;cursor:pointer;transition:.2s}
.tab:hover{color:var(--text);border-color:var(--muted)}
.tab.active{background:var(--gold);color:#000;border-color:var(--gold);box-shadow:0 0 15px rgba(255,211,42,.25)}
.tab.new-badge{border-color:var(--purple);color:#d1ccc0}
.tab.new-badge.active{background:var(--purple);color:#fff;border-color:var(--purple);box-shadow:0 0 15px rgba(165,94,234,.3)}

/* Canvas Area */
.canvas-card{background:var(--panel);border:1px solid var(--border);border-radius:1.2rem;padding:1.25rem;margin-bottom:1.5rem;position:relative}
canvas#anim{display:block;width:100%;border-radius:.8rem;background:#03030a;border:1px solid rgba(255,255,255,.05)}

/* Controls */
.controls{display:flex;align-items:center;gap:.8rem;margin-top:1.2rem;flex-wrap:wrap}
.btn{padding:.6rem 1.2rem;border-radius:.6rem;border:none;cursor:pointer;font-family:var(--fh);font-size:.85rem;font-weight:700;transition:.15s}
.btn-play{background:var(--gold);color:#000}
.btn-play:hover{background:#ffc000;transform:translateY(-1px)}
.btn-reset{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-reset:hover{border-color:var(--text);background:rgba(255,255,255,.05)}

.mode-toggle{display:flex;background:#03030a;border:1px solid var(--border);border-radius:.6rem;padding:.2rem;margin-left:auto}
.mode-btn{padding:.4rem .8rem;border-radius:.4rem;border:none;background:transparent;color:var(--muted);font-family:var(--fm);font-size:.72rem;cursor:pointer;font-weight:700}
.mode-btn.active{background:var(--border);color:var(--gold)}

/* Dynamic Box Explain */
.explain-box{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:1rem;padding:1.4rem;line-height:1.6}
.explain-box h3{color:var(--gold);font-size:1.1rem;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.explain-box p{color:var(--text);font-size:.9rem;margin-bottom:.8rem}
.explain-box p:last-child{margin-bottom:0}
.highlight-pill{display:inline-block;padding:.15rem .5rem;border-radius:.3rem;font-family:var(--fm);font-size:.78rem;font-weight:700;margin:.1rem 0}
.hp-sid{background:rgba(84,160,255,.15);color:var(--sid);border:1px solid rgba(84,160,255,.3)}
.hp-sol{background:rgba(255,140,105,.15);color:var(--tropic);border:1px solid rgba(255,140,105,.3)}
.hp-pur{background:rgba(165,94,234,.15);color:#d980fa;border:1px solid rgba(165,94,234,.3)}
</style>
</head>
<body>
<div class="page">

<div class="eyebrow">Master Simulator · Presisi Astronomi & Waktu</div>
<h1>Hari Sideris vs Surya & <em>Kalender Tropis</em></h1>
<p class="sub">Eksplorasi lengkap dari selisih rotasi harian (~4 menit) hingga pergeseran tahunan kalender akibat goyangan sumbu Bumi (Presesi).</p>

<div class="tabs">
  <button class="tab active" data-step="1">① Pembuktian Harian (Sideris vs Surya)</button>
  <button class="tab" data-step="0">② Rotasi Murni 360°</button>
  <button class="tab" data-step="2">③ Jam Real-Time</button>
  <button class="tab new-badge" data-step="3">④ Akumulasi 1 Tahun (365 vs 366 Hari) 🔥</button>
  <button class="tab new-badge" data-step="4">⑤ Kalender Tropis vs Sideris (Presesi) 🌍</button>
</div>

<div class="canvas-card">
  <canvas id="anim" height="450"></canvas>
  <div class="controls">
    <button class="btn btn-play" id="btnPlay">▶ Play Animasi</button>
    <button class="btn btn-reset" id="btnReset">↺ Ulang dari Awal</button>
    
    <div class="mode-toggle" id="modeWrap">
      <button class="mode-btn active" data-deg="45">Mode 45° (Eksagerasi Jelas)</button>
      <button class="mode-btn" data-deg="1">Mode 1° (Skala Nyata)</button>
    </div>
  </div>
</div>

<div class="explain-box" id="explainText"></div>

</div>

<script>
const canvas = document.getElementById('anim');
const ctx = canvas.getContext('2d');

let step = 1;
let playing = false;
let progress = 0; 
let raf;
let lastTs = null;
let EXTRA_DEG = 45;

const SID_DAY_SEC = 86164.1;
const SOL_DAY_SEC = 86400;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth - 40;
  const h = Math.min(w * 0.62, 450);
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', () => { resize(); draw(); });

function W(){ return canvas.width / (window.devicePixelRatio||1); }
function H(){ return canvas.height / (window.devicePixelRatio||1); }

function drawStarBg() {
  const w = W(), h = H();
  const seed = [[0.05,0.1],[0.15,0.07],[0.28,0.18],[0.72,0.05],[0.85,0.12],[0.92,0.25],[0.08,0.75],[0.18,0.88],[0.88,0.72],[0.95,0.85],[0.42,0.08],[0.60,0.12],[0.78,0.92],[0.30,0.90],[0.55,0.95],[0.12,0.50],[0.90,0.50],[0.50,0.04],[0.65,0.80],[0.35,0.60]];
  for(const [fx,fy] of seed){
    ctx.beginPath();
    ctx.arc(fx*w, fy*h, 1.2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();
  }
}

function drawSun(x, y, r){
  const g = ctx.createRadialGradient(x,y,0,x,y,r*2.5);
  g.addColorStop(0,'rgba(255,140,0,.35)');
  g.addColorStop(1,'rgba(255,140,0,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r*2.5,0,Math.PI*2); ctx.fill();
  
  const g2 = ctx.createRadialGradient(x-r*.2,y-r*.2,r*.05,x,y,r);
  g2.addColorStop(0,'#fff8c0'); g2.addColorStop(.6,'#ffae00'); g2.addColorStop(1,'#d45b00');
  ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
}

function drawEarth(x, y, r, pointerAngle, style="solid", label=""){
  ctx.save();
  ctx.translate(x, y);
  if(style === "ghost") ctx.globalAlpha = 0.25;
  else if(style === "sidereal") ctx.globalAlpha = 0.75;

  const g = ctx.createRadialGradient(0,0,0,0,0,r*1.6);
  g.addColorStop(0, style === "sidereal" ? 'rgba(84,160,255,.4)' : 'rgba(46,213,115,.3)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,r*1.6,0,Math.PI*2); ctx.fill();
  
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
  if(style === "sidereal") ctx.fillStyle = "#2e86de";
  else if(style === "ghost") ctx.fillStyle = "#57606f";
  else {
    const g2=ctx.createRadialGradient(-r*.2,-r*.2,r*.1,0,0,r);
    g2.addColorStop(0,'#7bed9f'); g2.addColorStop(.6,'#2ed573'); g2.addColorStop(1,'#1b9cfc');
    ctx.fillStyle=g2;
  }
  ctx.fill();
  
  ctx.rotate(pointerAngle);
  ctx.strokeStyle = style === "sidereal" ? "#54a0ff" : "#ffffff";
  ctx.lineWidth = style === "ghost" ? 1.5 : 2.5;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(r*1.5, 0); ctx.stroke();
  
  ctx.beginPath(); ctx.arc(r*1.5, 0, 3.5, 0, Math.PI*2);
  ctx.fillStyle = style === "sidereal" ? "#54a0ff" : "#ffd32a";
  ctx.fill();
  
  ctx.restore();

  if(label){
    ctx.save();
    ctx.font = '700 11px Space Grotesk';
    ctx.fillStyle = style === "sidereal" ? '#54a0ff' : '#2ed573';
    ctx.textAlign = 'center';
    ctx.fillText(label, x, y - r*1.8);
    ctx.restore();
  }
}

// ────────────────────────────────────────────
// STEP 1: PEMBUKTIAN HARIAN
// ────────────────────────────────────────────
function drawStep1(p){
  const w = W(), h = H();
  const sunX = w * 0.38, sunY = h * 0.48;
  const orbitR = Math.min(w, h) * 0.35, earthR = Math.min(w, h) * 0.055;
  ctx.clearRect(0, 0, w, h); drawStarBg();

  ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,.12)'; ctx.lineWidth = 1.5; ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.arc(sunX, sunY, orbitR, 0, Math.PI*2); ctx.stroke(); ctx.restore();
  drawSun(sunX, sunY, Math.min(w, h) * 0.07);

  const startOrbitAngle = Math.PI; 
  const extraRad = EXTRA_DEG * Math.PI / 180;
  const totalSpinRad = (Math.PI * 2) + extraRad;
  const curOrbitAngle = startOrbitAngle - (p * extraRad);
  const curSpinAngle = -(p * totalSpinRad); 

  const ex0 = sunX - orbitR, ey0 = sunY;
  const pSidereal = (Math.PI * 2) / totalSpinRad; 
  const sidOrbitAngle = startOrbitAngle - (pSidereal * extraRad);
  const exSid = sunX + Math.cos(sidOrbitAngle) * orbitR, eySid = sunY + Math.sin(sidOrbitAngle) * orbitR;
  const ex = sunX + Math.cos(curOrbitAngle) * orbitR, ey = sunY + Math.sin(curOrbitAngle) * orbitR;
  const starX = w * 0.94;

  ctx.fillStyle = '#fff'; ctx.font = '700 11px Space Grotesk'; ctx.textAlign = 'right';
  ctx.fillText('★ Bintang Acuan Jauh (Sejajar)', starX, sunY - 15);

  drawEarth(ex0, ey0, earthR, 0, "ghost", "00:00");
  ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(ex0, ey0); ctx.lineTo(starX, ey0); ctx.stroke(); ctx.restore();

  if(p >= pSidereal){
    ctx.save(); ctx.strokeStyle = '#54a0ff'; ctx.lineWidth = 1.8; ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.moveTo(exSid, eySid); ctx.lineTo(starX, eySid); ctx.stroke(); ctx.restore();
    drawEarth(exSid, eySid, earthR, 0, "sidereal", "23j 56m (Sideris)");
    ctx.save(); ctx.strokeStyle = 'rgba(255,140,0,.4)'; ctx.setLineDash([2,4]);
    ctx.beginPath(); ctx.moveTo(exSid, eySid); ctx.lineTo(sunX, sunY); ctx.stroke(); ctx.restore();
  }

  ctx.save(); ctx.strokeStyle = '#ff8c69'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(sunX, sunY); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.strokeStyle = 'rgba(84,160,255,.5)'; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(starX, ey); ctx.stroke(); ctx.restore();

  drawEarth(ex, ey, earthR, curSpinAngle, "solid", p >= 0.99 ? "24j 00m (Surya)" : "");

  if(p > pSidereal){
    const angleToSun = Math.atan2(sunY - ey, sunX - ex);
    ctx.save(); ctx.strokeStyle = '#ffd32a'; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.arc(ex, ey, earthR * 1.8, angleToSun, 0); ctx.stroke();
    ctx.font = '700 12px Space Mono'; ctx.fillStyle = '#ffd32a'; ctx.textAlign = 'left';
    ctx.fillText(`Δ ${EXTRA_DEG === 45 ? "45°" : "~1°"} (~3m 56s)`, ex + earthR * 2, ey + 5);
    ctx.restore();
  }
  ctx.save(); ctx.strokeStyle = '#ff8c69'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(sunX, sunY, orbitR, startOrbitAngle, curOrbitAngle, true); ctx.stroke(); ctx.restore();
}

// ────────────────────────────────────────────
// STEP 0: ROTASI MURNI
// ────────────────────────────────────────────
function drawStep0(p){
  const w = W(), h = H(), cx = w/2, cy = h/2, earthR = Math.min(w, h) * 0.12;
  ctx.clearRect(0, 0, w, h); drawStarBg();
  const starX = w * 0.85;
  ctx.save(); ctx.strokeStyle = '#54a0ff'; ctx.lineWidth = 2; ctx.setLineDash([6,6]);
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(starX, cy); ctx.stroke(); ctx.restore();
  ctx.fillStyle = '#fff'; ctx.font = '700 13px Space Grotesk'; ctx.textAlign = 'center';
  ctx.fillText('★ Bintang Acuan Jauh', starX, cy - 15);
  const rot = -(p * Math.PI * 2);
  drawEarth(cx, cy, earthR, rot, "solid", "Rotasi Murni 360°");
}

// ────────────────────────────────────────────
// STEP 2: JAM REAL-TIME
// ────────────────────────────────────────────
function drawStep2(p){
  const w = W(), h = H(), cx = w * 0.35, cy = h * 0.5;
  const orbitR = Math.min(w, h) * 0.32, earthR = Math.min(w, h) * 0.065;
  ctx.clearRect(0, 0, w, h); drawStarBg();
  drawSun(cx, cy, Math.min(w, h) * 0.07);
  const curOrb = Math.PI - (p * (EXTRA_DEG * Math.PI / 180));
  const ex = cx + Math.cos(curOrb) * orbitR, ey = cy + Math.sin(curOrb) * orbitR;
  ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.arc(cx, cy, orbitR, 0, Math.PI*2); ctx.stroke(); ctx.restore();
  drawEarth(ex, ey, earthR, -(p * ((Math.PI * 2) + (EXTRA_DEG * Math.PI / 180))), "solid");

  const sidSec = Math.min(SID_DAY_SEC, p * SID_DAY_SEC * (1 + EXTRA_DEG/360));
  const solSec = p * SOL_DAY_SEC;
  const pad = n => String(Math.floor(n)).padStart(2, '0');
  const tx = w * 0.68, ty = h * 0.4;
  ctx.save();
  ctx.fillStyle = '#111130'; ctx.strokeStyle = '#54a0ff'; ctx.lineWidth = 2;
  ctx.fillRect(tx - 15, ty - 30, 220, 70); ctx.strokeRect(tx - 15, ty - 30, 220, 70);
  ctx.font = '700 11px Space Grotesk'; ctx.fillStyle = '#54a0ff'; ctx.fillText('JAM SIDERIS (BINTANG)', tx, ty - 10);
  ctx.font = '700 24px Space Mono'; ctx.fillStyle = '#fff'; ctx.fillText(`${pad(sidSec/3600)}:${pad((sidSec%3600)/60)}:${pad(sidSec%60)}`, tx, ty + 20);

  const ty2 = ty + 90;
  ctx.fillStyle = '#111130'; ctx.strokeStyle = '#ff8c69';
  ctx.fillRect(tx - 15, ty2 - 30, 220, 70); ctx.strokeRect(tx - 15, ty2 - 30, 220, 70);
  ctx.font = '700 11px Space Grotesk'; ctx.fillStyle = '#ff8c69'; ctx.fillText('JAM SURYA (MATAHARI)', tx, ty2 - 10);
  ctx.font = '700 24px Space Mono'; ctx.fillStyle = '#fff'; ctx.fillText(`${pad(solSec/3600)}:${pad((solSec%3600)/60)}:${pad(solSec%60)}`, tx, ty2 + 20);
  ctx.restore();
}

// ────────────────────────────────────────────
// STEP 3: AKUMULASI 1 TAHUN (365 vs 366 HARI) 🔥
// ────────────────────────────────────────────
function drawStep3(p){
  const w = W(), h = H(), cx = w * 0.45, cy = h * 0.53;
  const orbitR = Math.min(w, h) * 0.36, earthR = Math.min(w, h) * 0.05;
  ctx.clearRect(0, 0, w, h); drawStarBg();

  drawSun(cx, cy, Math.min(w, h) * 0.07);
  
  // Orbit Circle
  ctx.save(); ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.lineWidth = 1.5; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.arc(cx, cy, orbitR, 0, Math.PI*2); ctx.stroke(); ctx.restore();

  // Progress p = 0 to 1 represents 1 FULL YEAR (360 degrees orbit)
  const orbAngle = Math.PI - (p * Math.PI * 2);
  const ex = cx + Math.cos(orbAngle) * orbitR, ey = cy + Math.sin(orbAngle) * orbitR;

  // In 1 Solar Year: Earth rotates 365.24 times (Solar) and 366.24 times (Sidereal)!
  const solarDays = p * 365.24;
  const siderealDays = p * 366.24;

  // Draw Checkpoint Earths (Ghost) at 0, 3, 6, 9 months
  const checkpoints = [
    {ang: Math.PI, label: "Mulai (Bulan 0)"},
    {ang: Math.PI/2, label: "Bulan ke-3"},
    {ang: 0, label: "Bulan ke-6 🔥"},
    {ang: -Math.PI/2, label: "Bulan ke-9"}
  ];
  checkpoints.forEach(cp => {
    const cpx = cx + Math.cos(cp.ang)*orbitR, cpy = cy + Math.sin(cp.ang)*orbitR;
    ctx.save(); ctx.beginPath(); ctx.arc(cpx, cpy, 3, 0, Math.PI*2); ctx.fillStyle="rgba(255,255,255,.3)"; ctx.fill(); ctx.restore();
  });

  // Highlight di Bulan ke-6 (180 derajat / p=0.5)
  if(p >= 0.48 && p <= 0.55){
    ctx.save();
    ctx.strokeStyle = '#ffd32a'; ctx.lineWidth = 2;
    ctx.strokeRect(cx + orbitR - 35, cy - 45, 140, 90);
    ctx.fillStyle = 'rgba(255,211,42,.1)'; ctx.fillRect(cx + orbitR - 35, cy - 45, 140, 90);
    ctx.font = '700 11px Space Grotesk'; ctx.fillStyle = '#ffd32a'; ctx.textAlign = 'center';
    ctx.fillText('BAHAYA KALENDER SIDERIS!', cx + orbitR + 35, cy - 25);
    ctx.font = '400 10px Space Mono'; ctx.fillStyle = '#fff';
    ctx.fillText('Setelah 6 bulan (180 hari),', cx + orbitR + 35, cy - 8);
    ctx.fillText('selisih menumpuk 12 jam!', cx + orbitR + 35, cy + 6);
    ctx.fillText('Jam 12 Siang = Gelap/Malam!', cx + orbitR + 35, cy + 22);
    ctx.restore();
  }

  // Draw Active Earth (We spin it visually fast based on progress)
  const visualSpin = -(p * Math.PI * 12); // Speed up for visual effect
  drawEarth(ex, ey, earthR, visualSpin, "solid");

  // Garis Surya dari Bumi ke Matahari
  ctx.save(); ctx.strokeStyle = '#ff8c69'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(cx, cy); ctx.stroke(); ctx.restore();

  // Progress Arc Orbit
  ctx.save(); ctx.strokeStyle = '#ffd32a'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(cx, cy, orbitR, Math.PI, orbAngle, true); ctx.stroke(); ctx.restore();

  // Counter UI Card di Kanan
  const tx = w * 0.72, ty = h * 0.25;
  ctx.save();
  ctx.fillStyle = '#111130'; ctx.strokeStyle = '#ff8c69'; ctx.lineWidth = 2;
  ctx.fillRect(tx - 20, ty, 230, 80); ctx.strokeRect(tx - 20, ty, 230, 80);
  ctx.font = '700 11px Space Grotesk'; ctx.fillStyle = '#ff8c69'; ctx.fillText('HARI SURYA (KALENDER KITA)', tx, ty + 20);
  ctx.font = '700 28px Space Mono'; ctx.fillStyle = '#fff'; ctx.fillText(`${solarDays.toFixed(1)} hari`, tx, ty + 55);

  const ty2 = ty + 95;
  ctx.fillStyle = '#111130'; ctx.strokeStyle = '#54a0ff';
  ctx.fillRect(tx - 20, ty2, 230, 80); ctx.strokeRect(tx - 20, ty2, 230, 80);
  ctx.font = '700 11px Space Grotesk'; ctx.fillStyle = '#54a0ff'; ctx.fillText('ROTASI SIDERIS (THD BINTANG)', tx, ty2 + 20);
  ctx.font = '700 28px Space Mono'; ctx.fillStyle = '#fff'; ctx.fillText(`${siderealDays.toFixed(1)} rotasi`, tx, ty2 + 55);
  
  ctx.font = '600 11px Space Grotesk'; ctx.fillStyle = '#ffd32a';
  ctx.fillText('1 Tahun = Bumi berputar 1x LEBIH BANYAK!', tx - 15, ty2 + 105);
  ctx.restore();
}

// ────────────────────────────────────────────
// STEP 4: KALENDER TROPIS VS SIDERIS (PRESESI) 🌍
// ────────────────────────────────────────────
function drawStep4(p){
  const w = W(), h = H(), cx = w * 0.45, cy = h * 0.55;
  const orbitR = Math.min(w, h) * 0.32, earthR = Math.min(w, h) * 0.065;
  ctx.clearRect(0, 0, w, h); drawStarBg();

  drawSun(cx, cy, Math.min(w, h) * 0.07);

  // Background Zodiac Constellation (Aries & Pisces)
  ctx.save();
  ctx.font = '700 16px Space Grotesk'; ctx.fillStyle = 'rgba(255,255,255,.2)'; ctx.textAlign = 'center';
  ctx.fillText('♈ RASI ARIES (Zaman Kuno 0 Masehi)', cx + orbitR * 1.3, cy - 80);
  ctx.fillText('♓ RASI PISCES (Zaman Sekarang)', cx + orbitR * 1.3, cy + 90);
  ctx.restore();

  // Draw Earth at Spring Equinox position (Right side of Sun)
  const ex = cx + orbitR, ey = cy;
  
  // Precession Wobble Animation based on progress p
  // Wobble shifts Earth's equator/axis relative to stars!
  const wobbleAngle = (Math.sin(p * Math.PI * 2) * 0.3);
  
  drawEarth(ex, ey, earthR, wobbleAngle, "solid");

  // Garis Ekuinoks (Tropis) -> Lurus ke Matahari
  ctx.save(); ctx.strokeStyle = '#ff8c69'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(cx, cy); ctx.stroke();
  ctx.font = '700 11px Space Grotesk'; ctx.fillStyle = '#ff8c69'; ctx.textAlign = 'center';
  ctx.fillText('Garis Ekuinoks Tropis (Tetap 21 Maret)', (ex+cx)/2, cy - 10);
  ctx.restore();

  // Garis Sideris (Ke Rasi Bintang Aries) -> Bergeser karena Presesi!
  const driftY = -80 + (p * 160); // Drifting from Aries to Pisces
  ctx.save(); ctx.strokeStyle = '#a55eea'; ctx.lineWidth = 2.5; ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(ex, ey); ctx.lineTo(cx + orbitR * 1.3, cy + driftY); ctx.stroke();
  ctx.font = '700 11px Space Grotesk'; ctx.fillStyle = '#a55eea'; ctx.textAlign = 'left';
  ctx.fillText('← Acuan Kalender Sideris (Bergeser ~1° / 72 thn)', ex + 15, ey + driftY/2);
  ctx.restore();

  // UI Information Card
  const tx = w * 0.03, ty = h * 0.08;
  ctx.save();
  ctx.fillStyle = 'rgba(11,11,36,.9)'; ctx.strokeStyle = '#a55eea'; ctx.lineWidth = 2;
  ctx.fillRect(tx, ty, w * 0.94, 75); ctx.strokeRect(tx, ty, w * 0.94, 75);
  ctx.font = '700 13px Space Grotesk'; ctx.fillStyle = '#ffd32a';
  ctx.fillText('💡 MENGAPA TAHUN SIDERIS LEBIH PANJANG ~20 MENIT DARI TAHUN TROPIS?', tx + 15, ty + 25);
  ctx.font = '400 11px Space Grotesk'; ctx.fillStyle = '#fff';
  ctx.fillText('Sumbu Bumi bergoyang (Presesi) seperti gasing setiap 25.772 tahun! Titik musim semi (Ekuinoks) bergeser mundur.', tx + 15, ty + 45);
  ctx.fillText('• Kalender Tropis (Masehi): Mengunci MUSIM agar stabil.  • Kalender Sideris (Veda/Hindu): Mengunci RASI BINTANG.', tx + 15, ty + 62);
  ctx.restore();
}

function draw(){
  if(step === 1) drawStep1(progress);
  else if(step === 0) drawStep0(progress);
  else if(step === 2) drawStep2(progress);
  else if(step === 3) drawStep3(progress);
  else if(step === 4) drawStep4(progress);
}

function updateExplainText(){
  const box = document.getElementById('explainText');
  if(step === 1){
    box.innerHTML = `<h3>① Pembuktian Lengkap: Mengapa Butuh ~4 Menit Ekstra?</h3>
    <p>Ketika Bumi selesai berputar <span class="highlight-pill hp-sid">360° (Hari Sideris: 23j 56m)</span>, posisinya di orbit sudah maju sedikit. Akibatnya, jarum penunjuk belum menghadap ke Matahari!</p>
    <p>Bumi <strong>wajib melanjutkan putaran tambahan (<span class="highlight-pill hp-sol">Hari Surya/Tropis: 24j 00m</span>)</strong> untuk menebus pergeseran orbit tersebut agar Matahari kembali tepat berada di puncak langit (siang hari).</p>`;
  } else if(step === 0){
    box.innerHTML = `<h3>② Rotasi Murni 360° (Hari Sideris Sejati)</h3>
    <p>Ini adalah bayangan jika Bumi berputar di tempat tanpa mengelilingi Matahari. Satu rotasi penuh 360° memakan waktu tepat <strong>86.164,1 detik (23 jam 56 menit 4 detik)</strong>.</p>`;
  } else if(step === 2){
    box.innerHTML = `<h3>③ Balapan Waktu Real-Time</h3>
    <p>Lihat pergerakan angka jam secara langsung. Jam Sideris (biru) selalu mencapai waktu 24:00:00 sekitar <strong>3 menit 56 detik lebih cepat</strong> setiap harinya dibanding jam Surya kita!</p>`;
  } else if(step === 3){
    box.innerHTML = `<h3>④ Akumulasi 1 Tahun: Mengapa Kita Pakai Hari Surya? 🔥</h3>
    <p>Selisih 4 menit per hari mungkin terlihat kecil. Tapi jika kita menggunakan Kalender Sideris untuk kehidupan sehari-hari, setelah 6 bulan (180 hari), selisih itu menumpuk menjadi <strong>180 × 4 menit = 720 menit (12 Jam)!</strong></p>
    <p>Artinya, di bulan ke-6, <span class="highlight-pill hp-sid">Jam 12 Siang Sideris akan terjadi di tengah malam gelap gulita!</span> Itulah sebabnya seluruh dunia menggunakan <strong>Hari Surya (24 Jam)</strong>. Dalam 1 tahun tropis (~365,24 hari), Bumi sebenarnya berotasi sebanyak ~366,24 kali terhadap bintang!</p>`;
  } else if(step === 4){
    box.innerHTML = `<h3>⑤ Kalender Tropis vs Sideris & Presesi Sumbu Bumi 🌍</h3>
    <p>Sekarang bicara soal <strong>Tahun Kalender</strong>. Mengapa <span class="highlight-pill hp-sid">Tahun Sideris (~365,2563 hari)</span> lebih panjang <strong>~20 menit 24 detik</strong> dibanding <span class="highlight-pill hp-sol">Tahun Tropis (~365,2422 hari)</span>?</p>
    <p>Karena goyangan sumbu Bumi (<span class="highlight-pill hp-pur">Presesi Ekuinoks</span>), titik dimulainya musim semi bergeser mundur sekitar 50 detik busur per tahun (1 hari setiap 72 tahun). Kalender kita (Masehi/Gregorian) adalah <strong>Kalender Tropis</strong> yang mengunci musim agar 21 Maret selalu jadi awal musim semi. Sedangkan kalender kuno/Hindu adalah <strong>Kalender Sideris</strong> yang mengunci posisi rasi bintang zodiak!</p>`;
  }
}

const ANIM_DUR = [3.5, 5.5, 6, 10, 8];
function loop(ts){
  if(!playing) return;
  if(!lastTs) lastTs = ts;
  const dt = (ts - lastTs) / 1000;
  lastTs = ts;
  progress = Math.min(1, progress + (dt / ANIM_DUR[step]));
  draw();
  if(progress >= 1){ 
    playing = false; 
    document.getElementById('btnPlay').innerHTML = '▶ Play Animasi'; 
    return; 
  }
  raf = requestAnimationFrame(loop);
}

document.getElementById('btnPlay').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('btnPlay').innerHTML = playing ? '⏸ Pause' : '▶ Play Animasi';
  if(playing){ lastTs = null; raf = requestAnimationFrame(loop); }
});

document.getElementById('btnReset').addEventListener('click', () => {
  playing = false; progress = 0;
  document.getElementById('btnPlay').innerHTML = '▶ Play Animasi';
  cancelAnimationFrame(raf); draw();
});

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    step = +t.dataset.step;
    playing = false; progress = 0;
    document.getElementById('btnPlay').innerHTML = '▶ Play Animasi';
    updateExplainText();
    draw();
  });
});

document.querySelectorAll('.mode-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    EXTRA_DEG = +b.dataset.deg;
    progress = 0; playing = false;
    document.getElementById('btnPlay').innerHTML = '▶ Play Animasi';
    draw();
  });
});

updateExplainText();
draw();
</script>
